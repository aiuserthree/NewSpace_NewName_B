<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="Comfortable density — sampled px steps from the source" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 30px; }
  .rows { display: flex; flex-direction: column; gap: 12px; }
  .r { display: flex; align-items: center; gap: 14px; }
  .bar { height: 16px; background: var(--accent); border-radius: 4px; flex: 0 0 auto; }
  .lab { font-family: ui-monospace, monospace; font-size: 12px; color: var(--text-secondary); width: 96px; flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="rows">
    <div class="r"><span class="lab">--spacing-4</span><span class="bar" style="width:4px"></span></div>
    <div class="r"><span class="lab">--spacing-10</span><span class="bar" style="width:10px"></span></div>
    <div class="r"><span class="lab">--spacing-16</span><span class="bar" style="width:16px"></span></div>
    <div class="r"><span class="lab">--spacing-20</span><span class="bar" style="width:20px"></span></div>
    <div class="r"><span class="lab">--spacing-25</span><span class="bar" style="width:25px"></span></div>
    <div class="r"><span class="lab">--spacing-35</span><span class="bar" style="width:35px"></span></div>
    <div class="r"><span class="lab">--spacing-50</span><span class="bar" style="width:50px"></span></div>
    <div class="r"><span class="lab">--spacing-100</span><span class="bar" style="width:100px"></span></div>
  </div>
</body>
</html>
