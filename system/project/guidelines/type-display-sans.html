<!-- @dsCard group="Type" viewport="700x240" name="Display & title — sans" subtitle="Pretendard covers everything up to 50px; weight 500" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 34px; display: flex; flex-direction: column; gap: 18px; }
  .spec { display: flex; align-items: baseline; gap: 16px; }
  .txt { color: var(--text-primary); font-family: var(--font-sans); letter-spacing: 0.015em; }
  .d { font-size: 48px; line-height: 1.15; font-weight: 500; }
  .t { font-size: 34px; line-height: 1.2; font-weight: 500; }
  .tag { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
</style>
</head>
<body>
  <div class="spec"><span class="txt d">공간 이름 공모전</span><span class="tag">display · 48 / 1.15 · 500</span></div>
  <div class="spec"><span class="txt t">함께 이름을 지어요</span><span class="tag">title · 34 / 1.2 · 500</span></div>
</body>
</html>
