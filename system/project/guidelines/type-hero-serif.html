<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px 34px; }
  .hero { font-family: var(--font-serif-display); font-size: 66px; line-height: 1.15; font-weight: 400; color: var(--text-primary); letter-spacing: 0; margin: 0; }
  .latin { font-family: var(--font-serif-display); font-size: 40px; font-weight: 400; color: var(--text-secondary); margin: 14px 0 0; }
  .meta { margin-top: 18px; font-size: 12px; color: var(--text-tertiary); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <p class="hero">우리 공간의 이름을<br/>함께 지어주세요</p>
  <p class="latin">Golden hour workbench</p>
  <p class="meta">--font-serif-display · --text-display-lg 72 / 1.2 · weight 400</p>
</body>
</html>
