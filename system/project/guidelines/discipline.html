<!-- @dsCard group="Brand" viewport="700x200" name="Orange discipline" subtitle="One accent against warm neutrals — the system's core rule" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 30px; display: flex; gap: 26px; align-items: center; }
  .demo { flex: 0 0 auto; width: 300px; background: var(--surface-card); border-radius: var(--radius-cards); box-shadow: var(--shadow-lg); padding: 22px; display: flex; flex-direction: column; gap: 10px; }
  .demo h4 { margin: 0; font-family: var(--font-sans); font-size: 18px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.015em; }
  .demo p { margin: 0; font-family: var(--font-sans); font-size: 14px; line-height: 1.5; color: var(--text-secondary); letter-spacing: 0.015em; }
  .btn { align-self: flex-start; margin-top: 4px; background: var(--accent); color: #fff; font-family: var(--font-sans); font-size: 14px; font-weight: 600; padding: 9px 18px; border-radius: var(--radius-buttons); box-shadow: var(--shadow-sm); }
  .rule { flex: 1 1 0; font-family: var(--font-sans); font-size: 15px; line-height: 1.6; color: var(--text-secondary); letter-spacing: 0.015em; }
  .rule b { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="demo">
    <h4>참여해 주셔서 감사합니다</h4>
    <p>모든 것은 따뜻한 뉴트럴 위에 놓이고, 단 하나의 주황색만 에너지를 담습니다.</p>
    <span class="btn">참여 시작하기</span>
  </div>
  <p class="rule"><b>#fa5d00 는 오직</b> 주요 액션 · 활성 상태 · 링크 · 브랜드 순간에만. 본문이나 넓은 배경에는 절대 쓰지 않습니다. 두 번째 강조색은 도입하지 않습니다.</p>
</body>
</html>
