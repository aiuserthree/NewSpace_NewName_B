<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="공간 이름 공모전 · 인트로" description="Harvest 스타일 모바일 랜딩 — hero(serif) + 참여 방법 + 대상 공간 + 시작 CTA. 여기서 시작해 나머지 단계를 붙이세요." -->
<helmet><script src="./ds-base.js"></script></helmet>
<div style="max-width:430px;margin:0 auto;background:var(--surface-page);min-height:100vh;font-family:var(--font-sans);letter-spacing:0.015em;">

  <div style="height:54px;display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid var(--border-divider);position:sticky;top:0;background:var(--surface-page);z-index:10;">
    <span style="color:var(--accent);display:inline-flex;">
      <x-import component-from-global-scope="HarvestDesignSystem_eb006c.Icon" name="church" size="19" hint-size="19px,19px"></x-import>
    </span>
    <span style="font-size:15px;font-weight:600;color:var(--text-primary);">공간 이름 공모전</span>
  </div>

  <div style="position:relative;overflow:hidden;padding:44px 26px 36px;text-align:center;">
    <x-import component-from-global-scope="HarvestDesignSystem_eb006c.HeroWash" hint-size="100%,100%"></x-import>
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;">
      <span style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);">우리 교회 공간 이름 공모</span>
      <h1 style="margin:0;font-family:var(--font-serif-display);font-weight:400;font-size:40px;line-height:1.2;color:var(--text-primary);">우리 공간의 이름을<br/>함께 지어주세요</h1>
      <p style="margin:0;max-width:320px;font-size:16px;line-height:1.6;color:var(--text-secondary);">새로 짓고 단장하는 세 공간의 이름을 교인 여러분의 마음으로 제안해 주세요.</p>
    </div>
  </div>

  <div style="padding:8px 26px 24px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="width:40px;height:40px;flex:0 0 auto;border-radius:999px;background:var(--surface-wash);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;">1</span>
      <span style="font-size:16px;color:var(--text-primary);">이름과 연락처를 입력해요</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="width:40px;height:40px;flex:0 0 auto;border-radius:999px;background:var(--surface-wash);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;">2</span>
      <span style="font-size:16px;color:var(--text-primary);">세 공간의 이름을 제안해요</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="width:40px;height:40px;flex:0 0 auto;border-radius:999px;background:var(--surface-wash);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;">3</span>
      <span style="font-size:16px;color:var(--text-primary);">상위 후보는 현장 투표로 결정돼요</span>
    </div>
  </div>

  <div style="padding:4px 26px 20px;display:flex;flex-direction:column;gap:10px;">
    <span style="font-size:13px;font-weight:600;color:var(--text-tertiary);">공모 대상 공간 3곳</span>
    <div style="display:flex;align-items:center;gap:12px;background:var(--surface-card);border-radius:16px;padding:12px 16px;box-shadow:var(--shadow-sm);">
      <span style="font-weight:700;color:var(--accent);">①</span>
      <div style="display:flex;flex-direction:column;"><span style="font-size:16px;font-weight:600;color:var(--text-primary);">본당</span><span style="font-size:12px;color:var(--text-tertiary);">신축 · 조감도 제공</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;background:var(--surface-card);border-radius:16px;padding:12px 16px;box-shadow:var(--shadow-sm);">
      <span style="font-weight:700;color:var(--accent);">②</span>
      <div style="display:flex;flex-direction:column;"><span style="font-size:16px;font-weight:600;color:var(--text-primary);">소예배실</span><span style="font-size:12px;color:var(--text-tertiary);">사진 제공</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;background:var(--surface-card);border-radius:16px;padding:12px 16px;box-shadow:var(--shadow-sm);">
      <span style="font-weight:700;color:var(--accent);">③</span>
      <div style="display:flex;flex-direction:column;"><span style="font-size:16px;font-weight:600;color:var(--text-primary);">새가족부실</span><span style="font-size:12px;color:var(--text-tertiary);">사진 제공</span></div>
    </div>
  </div>

  <div style="padding:12px 26px 34px;">
    <x-import component-from-global-scope="HarvestDesignSystem_eb006c.Button" variant="primary" size="lg" full-width="true" right-icon="arrow-right" hint-size="100%,52px">참여 시작하기</x-import>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:760}}"></script>
</body>
</html>
